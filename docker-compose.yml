version: '3.9'
services:
  db:
    image: postgres:16
    container_name: gitsim-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gitsim
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    image: node:22
    container_name: gitsim-api
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gitsim
    volumes:
      - ./apps/api:/app
    depends_on:
      - db

volumes:
  pg_data:
